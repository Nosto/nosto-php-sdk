name: Codeception

on: [push]

jobs:

  tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    ############################################################################
    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '7.4'
        tools: composer:v2, prestissimo
        coverage: none

      #https://github.com/actions/cache/blob/master/examples.md#php---composer
    - name: Cache composer packages
      id: composer-cache
      run: |
        composer config cache-files-dir
        echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"
    - uses: actions/cache@v4
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-

    - name: Update project dependencies
      run: |
        composer install --prefer-dist --no-progress --no-suggest
        composer dump-autoload --optimize
    ############################################################################

    - name: Run the tests
      run: ./vendor/bin/codecept run --xml

    - name: Archive unit tests results
      uses: actions/upload-artifact@v4
      with:
        name: codeception-output-files
        path: tests/_output/

#    - name: Report annotations
#      id: report-annotations
#      run: ./vendor/bin/cs2pr chkphpcs.xml

  tests-dotenv56:
    name: Unit Tests (Dotenv 5.6 lane)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    ############################################################################
    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '7.4'
        tools: composer:v2, prestissimo
        coverage: none

    - name: Cache composer packages
      id: composer-cache-dotenv56
      run: |
        composer config cache-files-dir
        echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"
    - uses: actions/cache@v4
      with:
        path: ${{ steps.composer-cache-dotenv56.outputs.dir }}
        key: ${{ runner.os }}-composer-dotenv56-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-dotenv56-

    - name: Install and force Dotenv 5.6+
      run: |
        composer install --prefer-dist --no-progress
        composer update vlucas/phpdotenv -W --no-interaction --prefer-dist
        composer dump-autoload --optimize
    ############################################################################

    - name: Run the tests
      run: ./vendor/bin/codecept run --xml

    - name: Archive unit tests results
      uses: actions/upload-artifact@v4
      with:
        name: codeception-output-files-dotenv56
        path: tests/_output/
